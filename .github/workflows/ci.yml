name: Django CI - Brand Media Platform

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: testsecretkeyfordevonly
      DEBUG: True
      DJANGO_SETTINGS_MODULE: core.settings.dev
      # Dùng SQLite cho CI để ổn định 100% (không Docker issue)
      DATABASE_URL: sqlite:///test.db

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: 📦 Install dependencies + CI tools
        run: |
          cd brand-media-platform-be
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-django

      - name: Run migrations
        run: |
          cd brand-media-platform-be
          python manage.py migrate

      - name: 🧪 Run tests
        run: |
          cd brand-media-platform-be
          python manage.py test --verbosity=2