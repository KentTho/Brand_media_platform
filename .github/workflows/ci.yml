name: Django CI - Brand Media Platform

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: testsecretkeyfordevonly
      DEBUG: True
      DJANGO_SETTINGS_MODULE: core.settings.dev
      # Dùng SQLite cho CI để ổn định 100% (không Docker issue)
      DATABASE_URL: sqlite:///test.db

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: 📦 Install dependencies + CI tools
        run: |
          cd brand-media-platform-be
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-django

      - name: 🎨 Code format check (black)
        run: |
          cd brand-media-platform-be
          black --check .

      - name: 🧹 Lint check (flake8)
        run: |
          cd brand-media-platform-be
          flake8 . --exclude=migrations,venv,static,media,logs --max-line-length=120

      - name: 🧠 Check migrations
        run: |
          cd brand-media-platform-be
          python manage.py makemigrations --check --dry-run

      - name: 🧪 Run tests
        run: |
          cd brand-media-platform-be
          python manage.py test --verbosity=2