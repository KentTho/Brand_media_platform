name: Django CI - Brand Media Platform

on:
  push:
    branches: ["main", "develop"]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: brand_media_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: 123456
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DB_NAME: brand_media_db
      DB_USER: admin
      DB_PASSWORD: 123456
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: core.settings.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd brand-media-platform-be
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            sleep 2
          done

      - name: Run black
        run: |
          cd brand-media-platform-be
          black --check .

      - name: Run flake8
        run: |
          cd brand-media-platform-be
          flake8 . --exclude=migrations,venv,static,media --max-line-length=120

      - name: Check migrations
        run: |
          cd brand-media-platform-be
          python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: |
          cd brand-media-platform-be
          python manage.py test