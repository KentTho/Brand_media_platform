name: Django CI - Brand Media Platform

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15               # ← Dùng 15 thay vì 17 để ổn định
        env:
          POSTGRES_DB: brand_media_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: 123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=10s      # ← Thêm để chờ container start

    env:
      SECRET_KEY: testsecretkeyfordevonly
      DEBUG: True
      DB_NAME: brand_media_db
      DB_USER: admin
      DB_PASSWORD: 123456
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: core.settings.dev

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: 📦 Install dependencies + CI tools
        run: |
          cd brand-media-platform-be
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-django   # ← Đảm bảo install

      - name: 🧹 Lint check (flake8)
        run: |
          cd brand-media-platform-be
          flake8 . --exclude=migrations,venv,static,media,logs --max-line-length=120

      - name: 🎨 Code format check (black)
        run: |
          cd brand-media-platform-be
          black --check .

      - name: 🧠 Check migrations
        run: |
          cd brand-media-platform-be
          python manage.py makemigrations --check --dry-run

      - name: 🧪 Run tests
        run: |
          cd brand-media-platform-be
          python manage.py test --verbosity=2