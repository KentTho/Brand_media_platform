name: Next.js Frontend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "brand-media-frontend/**"
      - ".github/workflows/nextjs.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "brand-media-frontend/**"
      - ".github/workflows/nextjs.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brand-media-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: brand-media-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
